<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or "MedAI" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/styles.css" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg border-bottom">
  <div class="container py-2">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/dashboard">
      <span class="brand-mark">MA</span>
      <span class="fw-semibold">MedAI - Assistant</span>
    </a>
    <div class="d-flex align-items-center gap-3">
      {% if user %}
        <span class="text-muted small">{{ user.username }}</span>
        <form action="/logout" method="post" class="m-0">
          <button class="btn btn-outline-secondary btn-sm" type="submit">Logout</button>
        </form>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="app-shell">
    {% block content %}{% endblock %}
  </div>
</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</html>
