services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=medai
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medai"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - APP_SECRET_KEY=dev-change-me
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/medai
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
